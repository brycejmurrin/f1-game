name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/f1-game-project-26h3ng]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages serves ONE deployment at a time per environment, and the deploy
# request lives on GitHub's backend independently of this Actions job. Cancelling
# an in-progress run (cancel-in-progress: true) under a burst of rapid pushes
# abandons deployments GitHub has already accepted, wedging the single-slot queue
# so later deploys sit in `deployment_queued` until they hit the deploy-pages
# 10-min timeout ("Timeout reached, aborting!"). false = a new push WAITS for the
# in-flight deploy instead of killing it — the config the official Pages workflow
# ships. Intermediate queued runs are still coalesced; the latest one wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # Stage ONLY the runtime files. Uploading the repo root shipped a ~174 MB
      # artifact (142 MB of tests/ visual-regression snapshots + node_modules)
      # for a ~14 MB site — slow enough to hit the 10-minute Pages deployment
      # timeout. The game is static: html + manifest + js/css + icons + assets
      # is everything the browser ever requests.
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html version.json manifest.json _site/
          cp -r js css icons assets _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
